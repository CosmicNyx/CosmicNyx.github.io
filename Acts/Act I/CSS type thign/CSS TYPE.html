          <div class="grid-item"></div>
          <div class="grid-item"></div>

          <div class="grid-item"></div>

          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <div class="grid-item"></div>  
          <div class="grid-item"></div>  
          <!--third row-->

          <div class="grid-item"></div>
          <div class="grid-item"></div>  
          <div class="grid-item"></div>  
          <div class="grid-item"></div>
          <!--forth row-->

          <div class="grid-item"></div>  
          <div class="grid-item"></div>  
          <div class="grid-item"></div>
          <div class="grid-item"></div>
          <!--fifth row-->

          <div class="grid-item"></div> 
          <div class="grid-item"></div> 
          <div class="grid-item"></div> 
        </div>
        
        </body>
</html>
