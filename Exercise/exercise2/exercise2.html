<!doctype html>
<html>
    <head>
        <link rel="stylesheet" type = "text/css" href = "excercise2.css">
    </head>

    <body>
        <h1>display: grid</h1>
        
        <p>Use display: grid; to make a block-level grid container:</p>
        
        <!-- SWEDEN -->
        <div class="sweden">
            <!-- first row -->
          <div class="sweBlue"></div>
          <div class="sweYellow"></div>
          <div class="sweBlue"></div>
          <!-- second row -->
          <div class="sweYellow"></div>
          <div class="sweYellow"></div>
          <div class="sweYellow"></div>
          <!-- third row -->
          <div class="sweBlue"></div>
          <div class="sweYellow"></div>
          <div class="sweBlue"></div>
        </div>

        <br>

        <!-- DENMARK -->
        <div class="denmark">
            <!-- first row -->
          <div class="denRed"></div>
          <div class="white"></div>
          <div class="denRed"></div>
          <!-- second row -->
          <div class="white"></div>
          <div class="white"></div>
          <div class="white"></div>
          <!-- third row -->
          <div class="denRed"></div>
          <div class="white"></div>
          <div class="denRed"></div>
        </div>

        <br>

        <!-- FINLAND -->
        <div class="finland">
            <!-- first row -->
          <div class="white"></div>
          <div class="finBlue"></div>
          <div class="white"></div>
          <!-- second row -->
          <div class="finBlue"></div>
          <div class="finBlue"></div>
          <div class="finBlue"></div>
          <!-- third row -->
          <div class="white"></div>
          <div class="finBlue"></div>
          <div class="white"></div>
        </div>

        <br>

        <!-- ICELAND -->
        <div class="iceland">
          <!-- first row -->
        <div class="iceBlue"></div>
        <div class="white"></div>
        <div class="iceRed"></div>
        <div class="white"></div>
        <div class="iceBlue"></div>
        <!-- second row -->
        <div class="white"></div>
        <div class="white"></div>
        <div class="iceRed"></div>
        <div class="white"></div>
        <div class="white"></div>
        <!-- third row -->
        <div class="iceRed"></div>
        <div class="iceRed"></div>
        <div class="iceRed"></div>
        <div class="iceRed"></div>
        <div class="iceRed"></div>
        <!-- forth row -->
        <div class="white"></div>
        <div class="white"></div>
        <div class="iceRed"></div>
        <div class="white"></div>
        <div class="white"></div>
        <!-- fifth row -->
        <div class="iceBlue"></div>
        <div class="white"></div>
        <div class="iceRed"></div>
        <div class="white"></div>
        <div class="iceBlue"></div>
      </div>
        
        </body>
</html>
